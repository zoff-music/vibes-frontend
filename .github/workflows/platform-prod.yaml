name: platform-prod

on:
  push:
    branches: ["main"]
    paths:
      - "apps/platform/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "biome.json"
      - "tsconfig.json"
      - ".github/workflows/platform-prod.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: vibes-frontend-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    environment: production
    runs-on: [self-hosted, k3s, deployer, zoff-music-vibes-frontend]
    steps:
      - uses: actions/checkout@v5
      - name: Build
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/platform:${GITHUB_SHA}"
          docker build --no-cache -f apps/platform/Dockerfile -t "$IMAGE" .
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
      - name: Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker push "$IMAGE"
      - name: Dispatch deploy
        env:
          VIBES_INFRA_DISPATCH_TOKEN: ${{ secrets.VIBES_INFRA_DISPATCH_TOKEN }}
        run: |
          if [ -z "${VIBES_INFRA_DISPATCH_TOKEN}" ]; then
            echo "Skipping deploy dispatch because VIBES_INFRA_DISPATCH_TOKEN is not configured."
            exit 0
          fi

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${VIBES_INFRA_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/zoff-music/vibes-infra/actions/workflows/deploy.yaml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"app\":\"platform\",\"image\":\"${IMAGE}\"}}"
